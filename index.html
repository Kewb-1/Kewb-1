<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kewb's Snake</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #21262d;
      --green-0: #161b22;
      --green-1: #0e4429;
      --green-2: #006d32;
      --green-3: #26a641;
      --green-4: #39d353;
      --snake-head: #39d353;
      --snake-body: #26a641;
      --food: #f78166;
      --text: #e6edf3;
      --text-muted: #7d8590;
      --font: 'JetBrains Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 20px;
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-muted);
      font-size: 13px;
      letter-spacing: 0.05em;
    }

    .profile-header .username {
      color: var(--text);
      font-weight: 600;
      font-size: 15px;
    }

    .dot { color: var(--border); }

    .game-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--text-muted);
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .game-header .label {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .green-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green-4);
      box-shadow: 0 0 6px var(--green-4);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .score-display {
      font-size: 12px;
      color: var(--text-muted);
    }

    .score-display span {
      color: var(--green-4);
      font-weight: 600;
    }

    canvas {
      display: block;
      border-radius: 3px;
      image-rendering: pixelated;
    }

    .contribution-legend {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .legend-box {
      width: 10px; height: 10px;
      border-radius: 2px;
    }

    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .controls-row {
      display: flex;
      gap: 6px;
    }

    .btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      min-width: 36px;
      text-align: center;
      user-select: none;
    }

    .btn:hover {
      border-color: var(--green-3);
      color: var(--green-4);
      background: var(--bg);
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn-start {
      background: var(--green-2);
      border-color: var(--green-3);
      color: var(--text);
      padding: 8px 24px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .btn-start:hover {
      background: var(--green-3);
      color: #fff;
    }

    .overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(13,17,23,0.88);
      border-radius: 3px;
      pointer-events: none;
    }

    .overlay.visible { pointer-events: all; }

    .overlay-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--green-4);
      letter-spacing: 0.05em;
    }

    .overlay-sub {
      font-size: 12px;
      color: var(--text-muted);
    }

    .canvas-container {
      position: relative;
    }

    .stats-row {
      display: flex;
      gap: 16px;
      font-size: 11px;
      color: var(--text-muted);
      padding-top: 4px;
      border-top: 1px solid var(--border);
    }

    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-val { color: var(--text); font-weight: 600; font-size: 13px; }

    .keyboard-hint {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<div class="profile-header">
  <svg width="20" height="20" viewBox="0 0 16 16" fill="#7d8590"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
  <span class="username">Kewb-1</span>
  <span class="dot">/</span>
  <span>snake</span>
</div>

<div class="game-wrapper">
  <div class="game-header">
    <div class="label">
      <div class="green-dot"></div>
      <span>contribution-grid-snake.js</span>
    </div>
    <div class="score-display">score: <span id="scoreDisplay">0</span> &nbsp;|&nbsp; best: <span id="bestDisplay">0</span></div>
  </div>

  <div class="canvas-container" id="canvasContainer">
    <canvas id="gameCanvas"></canvas>
    <div class="overlay visible" id="overlay">
      <div class="overlay-title">🐍 snake.exe</div>
      <div class="overlay-sub">eat the commits. don't crash.</div>
      <button class="btn btn-start" id="startBtn">▶ run program</button>
    </div>
  </div>

  <div class="contribution-legend">
    <span>Less</span>
    <div class="legend-box" style="background:var(--green-0);border:1px solid var(--border)"></div>
    <div class="legend-box" style="background:var(--green-1)"></div>
    <div class="legend-box" style="background:var(--green-2)"></div>
    <div class="legend-box" style="background:var(--green-3)"></div>
    <div class="legend-box" style="background:var(--green-4)"></div>
    <span>More</span>
  </div>

  <div class="controls">
    <div class="controls-row">
      <button class="btn" id="upBtn">↑</button>
    </div>
    <div class="controls-row">
      <button class="btn" id="leftBtn">←</button>
      <button class="btn" id="downBtn">↓</button>
      <button class="btn" id="rightBtn">→</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat"><span class="stat-val" id="lengthStat">3</span><span>length</span></div>
    <div class="stat"><span class="stat-val" id="commitsStat">0</span><span>commits eaten</span></div>
    <div class="stat"><span class="stat-val" id="levelStat">1</span><span>level</span></div>
  </div>

  <div class="keyboard-hint">wasd / arrow keys · r to restart</div>
</div>

<script>
  const COLS = 26, ROWS = 7, CELL = 14, GAP = 2;
  const W = COLS * (CELL + GAP) - GAP;
  const H = ROWS * (CELL + GAP) - GAP;

  const canvas = document.getElementById('gameCanvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  const overlay = document.getElementById('overlay');
  const container = document.getElementById('canvasContainer');
  overlay.style.width = W + 'px';
  overlay.style.height = H + 'px';

  const COLORS = ['#161b22','#0e4429','#006d32','#26a641','#39d353'];
  const SNAKE_HEAD = '#39d353';
  const SNAKE_BODY = '#26a641';
  const FOOD_COLOR = '#f78166';
  const BG = '#0d1117';

  // Generate static "contribution" background
  const bgGrid = [];
  for (let r = 0; r < ROWS; r++) {
    bgGrid[r] = [];
    for (let c = 0; c < COLS; c++) {
      const rand = Math.random();
      if (rand < 0.35) bgGrid[r][c] = 0;
      else if (rand < 0.55) bgGrid[r][c] = 1;
      else if (rand < 0.72) bgGrid[r][c] = 2;
      else if (rand < 0.88) bgGrid[r][c] = 3;
      else bgGrid[r][c] = 4;
    }
  }

  let snake, dir, nextDir, food, score, best = 0, running = false, dead = false, commits = 0, level = 1;
  let frameInterval, lastTime = 0;

  function cellX(c) { return c * (CELL + GAP); }
  function cellY(r) { return r * (CELL + GAP); }

  function drawCell(c, r, color, radius = 2) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(cellX(c), cellY(r), CELL, CELL, radius);
    ctx.fill();
  }

  function drawBg() {
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, W, H);
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        drawCell(c, r, COLORS[bgGrid[r][c]], 2);
  }

  function spawnFood() {
    let pos;
    do {
      pos = { c: Math.floor(Math.random() * COLS), r: Math.floor(Math.random() * ROWS) };
    } while (snake.some(s => s.c === pos.c && s.r === pos.r));
    food = pos;
  }

  function init() {
    snake = [
      { c: 4, r: 3 }, { c: 3, r: 3 }, { c: 2, r: 3 }
    ];
    dir = { dc: 1, dr: 0 };
    nextDir = { dc: 1, dr: 0 };
    score = 0; commits = 0; level = 1;
    dead = false;
    spawnFood();
    updateStats();
  }

  function draw() {
    drawBg();

    // Food
    ctx.fillStyle = FOOD_COLOR;
    ctx.beginPath();
    ctx.roundRect(cellX(food.c) + 2, cellY(food.r) + 2, CELL - 4, CELL - 4, 3);
    ctx.fill();
    // Food glow
    ctx.shadowColor = FOOD_COLOR;
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.shadowBlur = 0;

    // Snake body
    for (let i = snake.length - 1; i >= 0; i--) {
      const s = snake[i];
      const isHead = i === 0;
      const color = isHead ? SNAKE_HEAD : SNAKE_BODY;
      ctx.fillStyle = color;
      if (isHead) {
        ctx.shadowColor = SNAKE_HEAD;
        ctx.shadowBlur = 10;
      }
      ctx.beginPath();
      ctx.roundRect(cellX(s.c), cellY(s.r), CELL, CELL, isHead ? 3 : 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }

  function step() {
    dir = nextDir;
    const head = snake[0];
    const newHead = { c: head.c + dir.dc, r: head.r + dir.dr };

    // Wall collision
    if (newHead.c < 0 || newHead.c >= COLS || newHead.r < 0 || newHead.r >= ROWS) {
      endGame(); return;
    }
    // Self collision
    if (snake.some(s => s.c === newHead.c && s.r === newHead.r)) {
      endGame(); return;
    }

    snake.unshift(newHead);

    if (newHead.c === food.c && newHead.r === food.r) {
      score += 10 * level;
      commits++;
      if (commits % 5 === 0) level++;
      if (score > best) best = score;
      spawnFood();
    } else {
      snake.pop();
    }

    updateStats();
    draw();
  }

  function updateStats() {
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('bestDisplay').textContent = best;
    document.getElementById('lengthStat').textContent = snake.length;
    document.getElementById('commitsStat').textContent = commits;
    document.getElementById('levelStat').textContent = level;
  }

  function getSpeed() { return Math.max(80, 180 - (level - 1) * 20); }

  function startGame() {
    init();
    running = true;
    overlay.classList.remove('visible');
    clearInterval(frameInterval);
    frameInterval = setInterval(step, getSpeed());
    draw();
  }

  function endGame() {
    running = false;
    dead = true;
    clearInterval(frameInterval);
    draw();
    // Flash red then show overlay
    setTimeout(() => {
      overlay.innerHTML = `
        <div class="overlay-title" style="color:#f78166">💀 fatal error</div>
        <div class="overlay-sub">score: ${score} &nbsp;|&nbsp; commits: ${commits}</div>
        <button class="btn btn-start" id="startBtn" style="background:#6e2a2a;border-color:#f78166">↺ restart</button>
      `;
      overlay.classList.add('visible');
      document.getElementById('startBtn').addEventListener('click', startGame);
    }, 300);
  }

  // Restart interval when level changes
  function checkLevelInterval() {
    if (running) {
      clearInterval(frameInterval);
      frameInterval = setInterval(step, getSpeed());
    }
  }
  const _spawnFood = spawnFood;
  spawnFood = function() { _spawnFood(); checkLevelInterval(); }

  // Controls
  function setDir(dc, dr) {
    if (dc === -dir.dc && dr === -dir.dr) return; // no reverse
    nextDir = { dc, dr };
  }

  document.addEventListener('keydown', e => {
    if (!running && (e.key === 'r' || e.key === 'R')) { startGame(); return; }
    switch(e.key) {
      case 'ArrowUp': case 'w': case 'W': e.preventDefault(); setDir(0, -1); break;
      case 'ArrowDown': case 's': case 'S': e.preventDefault(); setDir(0, 1); break;
      case 'ArrowLeft': case 'a': case 'A': e.preventDefault(); setDir(-1, 0); break;
      case 'ArrowRight': case 'd': case 'D': e.preventDefault(); setDir(1, 0); break;
    }
  });

  document.getElementById('upBtn').addEventListener('click', () => setDir(0, -1));
  document.getElementById('downBtn').addEventListener('click', () => setDir(0, 1));
  document.getElementById('leftBtn').addEventListener('click', () => setDir(-1, 0));
  document.getElementById('rightBtn').addEventListener('click', () => setDir(1, 0));
  document.getElementById('startBtn').addEventListener('click', startGame);

  // Touch swipe
  let touchStart = null;
  canvas.addEventListener('touchstart', e => { touchStart = e.touches[0]; }, { passive: true });
  canvas.addEventListener('touchend', e => {
    if (!touchStart) return;
    const dx = e.changedTouches[0].clientX - touchStart.clientX;
    const dy = e.changedTouches[0].clientY - touchStart.clientY;
    if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
    else setDir(0, dy > 0 ? 1 : -1);
    touchStart = null;
  }, { passive: true });

  // Initial draw
  drawBg();
</script>
</body>
</html>
